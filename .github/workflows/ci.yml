name: Java CI

on:
  push:
    branches:
      - story/501

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Customer Service
        working-directory: ExampleCustomerService
        run: mvn clean package

      - name: Build Loan Service
        working-directory: ExampleLoanService
        run: mvn clean package

      - name: Build Eureka Server
        working-directory: ExampleEurekaServer
        run: mvn clean package