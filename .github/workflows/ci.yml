name: Java CI/CD

on:
  push:
    branches:
      - story/501

env:
  CUSTOMER_IMAGE: gani14/customer-service
  LOAN_IMAGE: gani14/loan-service
  EUREKA_IMAGE: gani14/eureka-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Customer Service
        working-directory: ExampleCustomerService
        run: mvn clean package -DskipTests

      - name: Build Loan Service
        working-directory: ExampleLoanService
        run: mvn clean package -DskipTests

      - name: Build Eureka Server
        working-directory: ExampleEurekaServer
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Customer Image
        run: |
          docker build -t $CUSTOMER_IMAGE:${{ github.sha }} -t $CUSTOMER_IMAGE:latest ./ExampleCustomerService

      - name: Push Customer Image
        run: |
          docker push $CUSTOMER_IMAGE:${{ github.sha }}
          docker push $CUSTOMER_IMAGE:latest

      - name: Build Loan Image
        run: |
          docker build -t $LOAN_IMAGE:${{ github.sha }} -t $LOAN_IMAGE:latest ./ExampleLoanService

      - name: Push Loan Image
        run: |
          docker push $LOAN_IMAGE:${{ github.sha }}
          docker push $LOAN_IMAGE:latest

      - name: Build Eureka Image
        run: |
          docker build -t $EUREKA_IMAGE:${{ github.sha }} -t $EUREKA_IMAGE:latest ./ExampleEurekaServer

      - name: Push Eureka Image
        run: |
          docker push $EUREKA_IMAGE:${{ github.sha }}
          docker push $EUREKA_IMAGE:latest