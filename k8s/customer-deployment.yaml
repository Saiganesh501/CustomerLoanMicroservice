apiVersion: apps/v1
kind: Deployment

metadata:
  name: customer-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: customer-service

  template:
    metadata:
      labels:
        app: customer-service

    spec:
      containers:
        - name: customer-service
          image: gani14/customer-service:1.0
          ports:
            - containerPort: 8080