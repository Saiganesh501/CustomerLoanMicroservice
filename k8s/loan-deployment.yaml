apiVersion: apps/v1
kind: Deployment

metadata:
  name: loan-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: loan-service

  template:
    metadata:
      labels:
        app: loan-service

    spec:
      containers:
        - name: loan-service
          image: gani14/loan-service:1.0
          ports:
            - containerPort: 8081